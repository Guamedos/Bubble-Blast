name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android
        
      - name: Patch build.gradle minSdk
        run: |
          sed -i 's/minSdkVersion 22/minSdkVersion 24/' android/app/build.gradle
          cat android/app/build.gradle | grep minSdk
          
      - name: Fix network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system"/>
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/' android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' android/app/src/main/AndroidManifest.xml

      - name: Inject AdMob App ID into AndroidManifest
        run: |
          sed -i 's|</application>|<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-5311690528161092~2390433268"/>\n    </application>|' android/app/src/main/AndroidManifest.xml

      - name: Configure fullscreen and notch support
        run: |
          sed -i 's/android:theme="@style\/AppTheme.NoActionBarLaunch"/android:theme="@style\/AppTheme.NoActionBarLaunch" android:screenOrientation="portrait"/' android/app/src/main/AndroidManifest.xml
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>
              </style>
              <style name="AppTheme.NoActionBarLaunch" parent="Theme.SplashScreen">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>
              </style>
          </resources>
          EOF

      - name: Configure immersive fullscreen
        run: |
          cat > android/app/src/main/java/com/tuempresa/bubbleblast/MainActivity.java << 'EOF'
          package com.tuempresa.bubbleblast;
          import android.os.Bundle;
          import android.view.View;
          import android.view.WindowManager;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              getWindow().setFlags(
                WindowManager.LayoutParams.FLAG_FULLSCREEN,
                WindowManager.LayoutParams.FLAG_FULLSCREEN
              );
              getWindow().getDecorView().setSystemUiVisibility(
                View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                | View.SYSTEM_UI_FLAG_FULLSCREEN
                | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
              );
            }
          }
          EOF

      - name: Show AndroidManifest
        run: cat android/app/src/main/AndroidManifest.xml
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1 | tail -100

      - name: Check APK contents
        run: |
          cd android/app/build/outputs/apk/debug/
          ls -la
          cd /home/runner/work/Bubble-Blast/Bubble-Blast
          npx cap doctor
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bubble-blast-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
