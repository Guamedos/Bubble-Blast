// ─── SOUND ENGINE ─────────────────────────────────────────────────────────────
const SFX = (() => {
  let ctx = null;
  const getCtx = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  };

  // Utility: chain gain → destination
  const out = (gainVal, when, duration) => {
    const c = getCtx();
    const g = c.createGain();
    g.gain.setValueAtTime(gainVal, when);
    g.gain.exponentialRampToValueAtTime(0.0001, when + duration);
    g.connect(c.destination);
    return { c, g };
  };

  // Oscillator helper
  const osc = (type, freq, { c, g }, when, dur) => {
    const o = c.createOscillator();
    o.type = type;
    o.frequency.setValueAtTime(freq, when);
    o.connect(g);
    o.start(when); o.stop(when + dur);
    return o;
  };

  return {
    play(name, param = 1) {
      if (!appSettings.soundOn) return;
      try {
        const c = getCtx();
        const now = c.currentTime;
        if (name === 'shoot') {
          // Soft airy pop
          const { c: c2, g } = out(0.18, now, 0.18);
          const o = c2.createOscillator();
          o.type = 'sine';
          o.frequency.setValueAtTime(520, now);
          o.frequency.exponentialRampToValueAtTime(180, now + 0.14);
          o.connect(g); o.start(now); o.stop(now + 0.18);
        }
        else if (name === 'pop') {
          // Single bubble pop — bright pluck
          const { c: c2, g } = out(0.22, now, 0.22);
          g.gain.setValueAtTime(0.22, now);
          g.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
          const o = c2.createOscillator();
          o.type = 'triangle';
          o.frequency.setValueAtTime(900, now);
          o.frequency.exponentialRampToValueAtTime(300, now + 0.18);
          o.connect(g); o.start(now); o.stop(now + 0.22);
        }
        else if (name === 'burst') {
          // Bubble burst cluster — layered pops with noise
          for (let i = 0; i < 3; i++) {
            const t = now + i * 0.045;
            const { c: c2, g } = out(0.15, t, 0.2);
            const o = c2.createOscillator();
            o.type = 'sine';
            o.frequency.setValueAtTime(700 + i*120, t);
            o.frequency.exponentialRampToValueAtTime(200 + i*40, t + 0.15);
            o.connect(g); o.start(t); o.stop(t + 0.2);
          }
          // Noise burst
          const bufSize = c.sampleRate * 0.12;
          const buf = c.createBuffer(1, bufSize, c.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) data[i] = (Math.random()*2-1) * 0.4;
          const src = c.createBufferSource();
          src.buffer = buf;
          const nGain = c.createGain();
          nGain.gain.setValueAtTime(0.08, now);
          nGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
          src.connect(nGain); nGain.connect(c.destination);
          src.start(now); src.stop(now + 0.12);
        }
        else if (name === 'combo') {
          // Rising arpeggio — escalates in pitch and length with combo multiplier
          const semitones = (param - 1) * 5; // +5 semitones per combo level
          const ratio = Math.pow(2, semitones / 12);
          const baseNotes = [523, 659, 784, 1047, 1319];
          const count = Math.min(baseNotes.length, 2 + param);
          for (let i = 0; i < count; i++) {
            const t = now + i * 0.08;
            const freq = baseNotes[i] * ratio;
            const { c: c2, g } = out(0.18, t, 0.28);
            const o = c2.createOscillator();
            o.type = 'sine';
            o.frequency.setValueAtTime(freq, t);
            o.frequency.linearRampToValueAtTime(freq * 1.02, t + 0.28);
            const lfo = c2.createOscillator();
            const lfoGain = c2.createGain();
            lfo.frequency.value = 6 + param; lfoGain.gain.value = 6 + param * 2;
            lfo.connect(lfoGain); lfoGain.connect(o.frequency);
            lfo.start(t); lfo.stop(t + 0.28);
            o.connect(g); o.start(t); o.stop(t + 0.28);
          }
        }
        else if (name === 'bomb') {
          // Deep thud + rumble
          const { c: c2, g } = out(0.35, now, 0.5);
          const o = c2.createOscillator();
          o.type = 'sine';
          o.frequency.setValueAtTime(120, now);
          o.frequency.exponentialRampToValueAtTime(28, now + 0.45);
          o.connect(g); o.start(now); o.stop(now + 0.5);
          // Distortion noise
          const bufSize2 = c.sampleRate * 0.25;
          const buf2 = c.createBuffer(1, bufSize2, c.sampleRate);
          const d = buf2.getChannelData(0);
          for (let i = 0; i < bufSize2; i++) d[i] = (Math.random()*2-1);
          const src2 = c.createBufferSource(); src2.buffer = buf2;
          const nG = c.createGain();
          nG.gain.setValueAtTime(0.12, now);
          nG.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
          const filter = c.createBiquadFilter();
          filter.type = 'lowpass'; filter.frequency.value = 400;
          src2.connect(filter); filter.connect(nG); nG.connect(c.destination);
          src2.start(now); src2.stop(now + 0.25);
        }
        else if (name === 'painter') {
          // Magical colour sweep — ascending glissando
          const { c: c2, g } = out(0.2, now, 0.6);
          const o = c2.createOscillator();
          o.type = 'sine';
          o.frequency.setValueAtTime(300, now);
          o.frequency.exponentialRampToValueAtTime(1200, now + 0.45);
          o.connect(g); o.start(now); o.stop(now + 0.6);
          // Sparkle layer
          for (let i = 0; i < 4; i++) {
            const t = now + i * 0.12;
            const { c: c3, g: g3 } = out(0.08, t, 0.15);
            const o2 = c3.createOscillator();
            o2.type = 'triangle';
            o2.frequency.value = 1200 + i * 300;
            o2.connect(g3); o2.start(t); o2.stop(t + 0.15);
          }
        }
        else if (name === 'newrow') {
          // Subtle low tick
          const { c: c2, g } = out(0.12, now, 0.12);
          const o = c2.createOscillator();
          o.type = 'sine';
          o.frequency.setValueAtTime(180, now);
          o.frequency.exponentialRampToValueAtTime(100, now + 0.1);
          o.connect(g); o.start(now); o.stop(now + 0.12);
        }
        else if (name === 'victory') {
          // Warm fanfare — major chord arpeggio
          const fanfare = [523, 659, 784, 1047, 784, 1047, 1319];
          fanfare.forEach((freq, i) => {
            const t = now + i * 0.1;
            const { c: c2, g } = out(i < 5 ? 0.18 : 0.22, t, 0.35);
            const o = c2.createOscillator();
            o.type = i % 2 === 0 ? 'sine' : 'triangle';
            o.frequency.setValueAtTime(freq, t);
            o.connect(g); o.start(t); o.stop(t + 0.35);
          });
        }
        else if (name === 'defeat') {
          // Wah-wah descending
          const notes = [392, 330, 277, 220];
          notes.forEach((freq, i) => {
            const t = now + i * 0.18;
            const { c: c2, g } = out(0.2, t, 0.3);
            const o = c2.createOscillator();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(freq, t);
            // Low-pass filter for wah effect
            const f = c2.createBiquadFilter();
            f.type = 'lowpass';
            f.frequency.setValueAtTime(1200, t);
            f.frequency.exponentialRampToValueAtTime(200, t + 0.28);
            o.connect(f); f.connect(g);
            o.start(t); o.stop(t + 0.3);
          });
        }
        else if (name === 'land') {
          // Soft thud when bubble lands without match
          const { c: c2, g } = out(0.1, now, 0.1);
          const o = c2.createOscillator();
          o.type = 'sine';
          o.frequency.setValueAtTime(220, now);
          o.frequency.exponentialRampToValueAtTime(80, now + 0.08);
          o.connect(g); o.start(now); o.stop(now + 0.1);
        }
      } catch(e) { /* audio error — ignore silently */ }
    }
  };
})();

// Large offset so row indices are always positive even after many scrolls
const ROW_OFFSET   = 1000;
const VISIBLE_ROWS = 5;
const BASE_NEW_ROWS = 3; // rows at level 1; +1 every 5 levels
function maxNewRowsForLevel(lvl) { return BASE_NEW_ROWS + Math.floor((lvl - 1) / 5); }
const BASE_ROW_DELAY = 10000; // ms at level 1; -200ms every 10 levels, min 2000ms
function rowDelayForLevel(lvl) { return Math.max(2000, BASE_ROW_DELAY - Math.floor((lvl - 1) / 10) * 200); }

const BOARD_LEFT = (GW - COLS * D) / 2;
const FIRST_ROW_Y = 72;

// cameraRow starts at ROW_OFFSET, new rows are added at ROW_OFFSET-1, ROW_OFFSET-2...
// Row indices are always >= 0

function cellXY(row, col, cameraRow) {
  const xOff = (row % 2 === 0) ? 0 : R;
  return {
    x: BOARD_LEFT + col * D + R + xOff,
    y: FIRST_ROW_Y + (row - cameraRow) * ROW_H,
  };
}

function hexNeighbours(row, col) {
  const even = (row % 2 === 0);
  return even
    ? [[row-1,col-1],[row-1,col],[row,col-1],[row,col+1],[row+1,col-1],[row+1,col]]
    : [[row-1,col],[row-1,col+1],[row,col-1],[row,col+1],[row+1,col],[row+1,col+1]];
}

// Odd rows are offset +R to the right, so they fit one fewer bubble
function colsForRow(row) { return row % 2 === 0 ? COLS : COLS - 1; }

// Persists the current level across scene transitions
let currentLevel = parseInt(localStorage.getItem('bb_level') || '1', 10);

// ─── ADS ─────────────────────────────────────────────────────────────────────
// IDs de AdMob — sustituir por los reales antes de publicar:
//   ADMOB_APP_ID        → capacitor.config.json > plugins > AdMob > appId
//   ADMOB_INTERSTITIAL  → ID de bloque de anuncio intersticial
//   ADMOB_REWARDED      → ID de bloque de anuncio recompensado
const ADMOB_INTERSTITIAL_ID = 'ca-app-pub-XXXXXXXXXXXXXXXX/XXXXXXXXXX';
const ADMOB_REWARDED_ID     = 'ca-app-pub-XXXXXXXXXXXXXXXX/XXXXXXXXXX';

const Ads = {
  // Anuncio intersticial (saltable tras 5s). onDismissed se llama siempre.
  async showInterstitial(onDismissed) {
    try {
      const { AdMob, InterstitialAdPluginEvents } = window.CapacitorAdMob || {};
      if (!AdMob) { onDismissed(); return; }
      AdMob.addListener(InterstitialAdPluginEvents.Dismissed, () => onDismissed());
      await AdMob.prepareInterstitial({ adId: ADMOB_INTERSTITIAL_ID });
      await AdMob.showInterstitial();
    } catch (e) {
      console.warn('[Ads] Interstitial error:', e);
      onDismissed();
    }
  },
  // Anuncio recompensado. onGranted solo se llama si el usuario lo ve completo.
  async showRewarded(onGranted, onDismissed) {
    try {
      const { AdMob, RewardAdPluginEvents } = window.CapacitorAdMob || {};
      if (!AdMob) { onGranted(); if (onDismissed) onDismissed(); return; }
      AdMob.addListener(RewardAdPluginEvents.Rewarded, () => onGranted());
      AdMob.addListener(RewardAdPluginEvents.Dismissed, () => { if (onDismissed) onDismissed(); });
      await AdMob.prepareRewardVideoAd({ adId: ADMOB_REWARDED_ID });
      await AdMob.showRewardVideoAd();
    } catch (e) {
      console.warn('[Ads] Rewarded error:', e);
      onGranted();
      if (onDismissed) onDismissed();
    }
  },
};

// ─── ICON HELPERS ────────────────────────────────────────────────────────────

function drawGearIcon(gfx, cx, cy, r) {
  const teeth = 8;
  const innerR = r * 0.55;
  const outerR = r;
  const toothW = Math.PI / teeth * 0.5;
  gfx.fillStyle(0xffd700, 0.9);
  gfx.beginPath();
  for (let i = 0; i < teeth; i++) {
    const a1 = (i / teeth) * Math.PI * 2 - toothW;
    const a2 = (i / teeth) * Math.PI * 2 + toothW;
    const a3 = ((i + 0.5) / teeth) * Math.PI * 2 - toothW * 0.5;
    const a4 = ((i + 0.5) / teeth) * Math.PI * 2 + toothW * 0.5;
    if (i === 0) gfx.moveTo(cx + Math.cos(a1) * innerR, cy + Math.sin(a1) * innerR);
    else         gfx.lineTo(cx + Math.cos(a1) * innerR, cy + Math.sin(a1) * innerR);
    gfx.lineTo(cx + Math.cos(a1) * outerR, cy + Math.sin(a1) * outerR);
    gfx.lineTo(cx + Math.cos(a2) * outerR, cy + Math.sin(a2) * outerR);
    gfx.lineTo(cx + Math.cos(a2) * innerR, cy + Math.sin(a2) * innerR);
    gfx.lineTo(cx + Math.cos(a3) * innerR, cy + Math.sin(a3) * innerR);
    gfx.lineTo(cx + Math.cos(a4) * innerR, cy + Math.sin(a4) * innerR);
  }
  gfx.closePath();
  gfx.fillPath();
  // Center hole
  gfx.fillStyle(0x18181b, 1);
  gfx.fillCircle(cx, cy, r * 0.28);
}

function drawPaletteIcon(gfx, cx, cy, r) {
  // Palette oval body
  gfx.fillStyle(0xffd700, 0.9);
  gfx.fillEllipse(cx, cy, r * 1.8, r * 1.6);
  // Thumb hole
  gfx.fillStyle(0x18181b, 1);
  gfx.fillCircle(cx + r * 0.45, cy + r * 0.3, r * 0.28);
  // Color dots
  const dotColors = [0xe74c3c, 0x3498db, 0x2ecc71, 0xf39c12, 0x9b59b6];
  const dotPositions = [
    [-r*0.45, -r*0.35], [r*0.45, -r*0.35],
    [-r*0.6, r*0.1],    [r*0.0, -r*0.5],  [r*0.55, r*0.1],
  ];
  for (let i = 0; i < dotColors.length; i++) {
    gfx.fillStyle(dotColors[i], 1);
    gfx.fillCircle(cx + dotPositions[i][0], cy + dotPositions[i][1], r * 0.18);
  }
}

class MenuScene extends Phaser.Scene {
  constructor() { super('Menu'); }

  create() {
    const W = this.scale.width, H = this.scale.height;
    this.floaters = [];

    // ── Background: use selected theme ──────────────────────────────────────
    const bg = this.add.graphics();

    bg.fillGradientStyle(_tl,_tr,_bl,_br,1);

    // ── Subtle grid/dot pattern overlay — rendered once to a texture ───────
    {
      const offscreen = document.createElement('canvas');

      const octx = offscreen.getContext('2d');

    // Load bubble textures for menu

    // Shine line across BLAST
    const shine = this.add.graphics();
    shine.fillStyle(0xffffff, 0.12);
    shine.fillRect(W/2 - 130, H*0.272, 260, 8);

    // Level indicator
    const lvlBadge = this.add.graphics();
    lvlBadge.fillStyle(0x7c3aed, 0.85); lvlBadge.fillRoundedRect(W/2-54, H*0.385, 108, 28, 14);
    lvlBadge.lineStyle(1, 0xa78bfa, 0.6); lvlBadge.strokeRoundedRect(W/2-54, H*0.385, 108, 28, 14);
    this.add.text(W/2, H*0.399, T().level_badge(currentLevel), {
      fontSize: '13px', fontFamily: 'Georgia,serif', fontStyle: 'bold',

    }).setOrigin(0.5);

    this.add.text(W/2, H*0.49, T().tagline, {

    }).setOrigin(0.5);

    // ── Palette button ──────────────────────────────────────────────────────
    const palG = this.add.graphics();
    palG.fillStyle(0x18181b, 0.9); palG.fillCircle(W-34, H-34, 24);
    palG.lineStyle(1.5, 0xffd700, 0.6); palG.strokeCircle(W-34, H-34, 24);
    drawPaletteIcon(palG, W-34, H-34, 13);
    this.add.zone(W-34, H-34, 48, 48).setInteractive({ useHandCursor: true })
      .on('pointerdown', () => this.scene.start('Customize'));

    // Options button (bottom-left)
    const optG = this.add.graphics();
    optG.fillStyle(0x18181b, 0.9); optG.fillCircle(34, H-34, 24);
    optG.lineStyle(1.5, 0xffd700, 0.6); optG.strokeCircle(34, H-34, 24);
    drawGearIcon(optG, 34, H-34, 13);
    this.add.zone(34, H-34, 48, 48).setInteractive({ useHandCursor: true })
      .on('pointerdown', () => showOptionsOverlay(this));

    // ── Animate title pulse ─────────────────────────────────────────────────

      targets: blastTxt, scaleX: 1.03, scaleY: 1.03,
      duration: 1800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
    });

  _btn(x, y, label, color, cb) {
    const g = this.add.graphics();
    const W = 230, H = 56, rx = 28;
    const draw = col => {
      g.clear();
      // Shadow
      g.fillStyle(0x000000, 0.3); g.fillRoundedRect(x-W/2+3, y-H/2+4, W, H, rx);
      // Body
      g.fillStyle(col, 1); g.fillRoundedRect(x-W/2, y-H/2, W, H, rx);
      // Top shine — inset so it stays within the rounded button
      g.fillStyle(0xffffff, 0.1);
      g.fillRoundedRect(x-W/2+6, y-H/2+5, W-12, H/2-8, { tl:22, tr:22, bl:0, br:0 });
      // Border
      g.lineStyle(1.5, 0xffffff, 0.15); g.strokeRoundedRect(x-W/2, y-H/2, W, H, rx);
      // Gold accent line top
      g.lineStyle(1, 0xffd700, 0.3); g.lineBetween(x-W/2+rx, y-H/2+1, x+W/2-rx, y-H/2+1);
    };
    draw(color);
    this.add.text(x, y, label, {
      fontSize: '21px', fontFamily: 'Georgia,serif', fontStyle: 'bold',
      color: '#fff', stroke: '#000', strokeThickness: 2
    }).setOrigin(0.5);
    const hoverColor = Phaser.Display.Color.IntegerToColor(color).lighten(18).color;
    const z = this.add.zone(x, y, W, H).setInteractive({ useHandCursor: true });
    z.on('pointerover', () => draw(hoverColor));
    z.on('pointerout',  () => draw(color));
    z.on('pointerdown', cb);
  }

  update() {
    const W = this.scale.width, H = this.scale.height;
    for (const f of this.floaters) {
      f.wobble += 0.012;
      f.g.x += f.vx + Math.sin(f.wobble) * 0.15;
      f.g.y += f.vy;
      if (f.g.y < -50) f.g.y = H + 50;
      if (f.g.x < -50) f.g.x = W + 50;
      if (f.g.x > W + 50) f.g.x = -50;
    }
  }
}

// ─── GAME SCENE ──────────────────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    this.W = this.scale.width;
    this.H = this.scale.height;

    this.score      = 0;
    this.level      = (this.scene.settings.data && this.scene.settings.data.level) || currentLevel;
    this.combo      = 0;
    this.shooting   = false;
    this.isDead     = false;
    this.numColors  = 4;

    this.rowsAdded = 0;
    this.cameraRow = ROW_OFFSET;
    this.maxNewRows = maxNewRowsForLevel(this.level);
    this.rowDelay   = rowDelayForLevel(this.level);

    // cells: Map of "row,col" -> colorIndex  (grid indices NEVER change)
    this.cells = new Map();

    // Shooter
    this.sx = this.W / 2;
    this.sy = this.H - 80;

    // Danger Y
    this.dangerY = this.sy - R * 3;

    this._buildLevel();
    this._initGraphics();
    this._initUI();
    this._nextBubble();

    this.input.on('pointerdown', this._onPointerDown, this);
    this.input.on('pointermove', this._onPointerMove, this);
    this.input.on('pointerup',   this._onPointerUp,   this);

    // Scroll one row every 20 seconds — use a consistent fixed timer
    this.rowTimer = this.time.addEvent({
      delay: this.rowDelay, loop: true, callback: this._scrollOneRow, callbackScope: this
    });
    this.lastScrollTime = this.time.now;
  }

  // ── Level generation ──────────────────────────────────────────────────────

  _buildLevel() {
    // Place VISIBLE_ROWS starting at ROW_OFFSET
    for (let r = ROW_OFFSET; r < ROW_OFFSET + VISIBLE_ROWS; r++) {
      const nColors = Math.max(2, Math.min(COLORS.length, this.numColors));
      for (let c = 0; c < colsForRow(r); c++) {
        this._set(r, c, Phaser.Math.Between(0, nColors - 1));
      }
    }
  }

  // ── Camera scroll ─────────────────────────────────────────────────────────

  _scrollOneRow() {
    if (this.isDead) return;

    // Reset timer so next scroll is always exactly 10s from now
    this.rowTimer.reset({ delay: this.rowDelay, loop: true, callback: this._scrollOneRow, callbackScope: this });

    // If a bubble is in flight, queue one scroll to fire once it lands
    if (this.shooting) { this._pendingScroll = (this._pendingScroll || 0) + 1; return; }

    const currentTop = Math.round(this.cameraRow);
    const newRow     = currentTop - 1;

    if (this.rowsAdded < this.maxNewRows && newRow >= 0 && !this._has(newRow, 0)) {
      const nColors = Math.max(2, Math.min(COLORS.length, this.numColors + 1));
      for (let c = 0; c < colsForRow(newRow); c++) {
        this._set(newRow, c, Phaser.Math.Between(0, nColors - 1));
      }
      this.rowsAdded++;
      SFX.play('newrow');
    }

    // Always scroll camera down by 1 row (pushes everything toward danger line)
    const from   = this.cameraRow;
    const target = currentTop - 1; // snap to integer first, then subtract
    this.tweens.addCounter({
      from, to: target, duration: 600, ease: 'Sine.easeInOut',
      onUpdate:   tw => { this.cameraRow = tw.getValue(); this._drawBoard(); },
      onComplete: () => { this.cameraRow = target; this._drawBoard(); this._checkDanger(); },
    });
  }

  // ── Cell helpers ──────────────────────────────────────────────────────────

  _key(row, col)    { return `${row},${col}`; }
  _get(row, col)    { return this.cells.get(this._key(row, col)) ?? -1; }
  _set(row, col, c) { this.cells.set(this._key(row, col), c); }
  _del(row, col)    { this.cells.delete(this._key(row, col)); }
  _has(row, col)    { return this.cells.has(this._key(row, col)); }

  _allCells() {
    return [...this.cells.entries()].map(([k, color]) => {
      const [row, col] = k.split(',').map(Number);
      return { row, col, color };
    });
  }

  // Convert world pos to nearest grid row using current cameraRow
  _worldToRow(wy) {
    return Math.round((wy - FIRST_ROW_Y) / ROW_H + this.cameraRow);
  }

  // ── Snap: find nearest empty adjacent cell to a world position ────────────

  _snapCell(wx, wy) {
    const approxRow = this._worldToRow(wy);
    let best = null, bd = Infinity;

    for (let r = approxRow - 3; r <= approxRow + 3; r++) {
      if (r < 0) continue;
      for (let c = 0; c < colsForRow(r); c++) {
        if (this._has(r, c)) continue;
        const ceilingRow = Math.round(this.cameraRow);
        const anchored   = r <= ceilingRow ||
          hexNeighbours(r, c).some(([nr, nc]) => nc >= 0 && nc < colsForRow(nr) && this._has(nr, nc));
        if (!anchored) continue;
        const { x, y } = cellXY(r, c, this.cameraRow);
        const d = Math.hypot(wx - x, wy - y);
        if (d < bd) { bd = d; best = { row: r, col: c }; }
      }
    }
    return best;
  }

  // ── Flood fill ────────────────────────────────────────────────────────────

  _floodFill(startRow, startCol) {
    const color = this._get(startRow, startCol);
    if (color < 0) return [];
    const visited = new Set();
    const result  = [];
    const stack   = [[startRow, startCol]];
    while (stack.length) {
      const [r, c] = stack.pop();
      const k = this._key(r, c);
      if (visited.has(k)) continue;
      if (this._get(r, c) !== color) continue;
      visited.add(k);
      result.push({ row: r, col: c });
      for (const [nr, nc] of hexNeighbours(r, c)) {
        stack.push([nr, nc]);
      }
    }
    return result;
  }

  // BFS from the visible top row — anything not reachable is floating
  _findConnected() {
    const connected = new Set();
    const queue     = [];

    // Find the actual topmost row that has any bubble
    let topRow = Infinity;
    for (const k of this.cells.keys()) {
      const r = parseInt(k.split(',')[0]);
      if (r < topRow) topRow = r;
    }
    if (topRow === Infinity) return connected;

    // Seed: all filled cells in the topmost row
    for (let c = 0; c < COLS; c++) {
      if (!this._has(topRow, c)) continue;
      const k = this._key(topRow, c);
      if (!connected.has(k)) { connected.add(k); queue.push([topRow, c]); }
    }
    while (queue.length) {
      const [r, c] = queue.shift();
      for (const [nr, nc] of hexNeighbours(r, c)) {
        if (nc < 0 || nc >= COLS) continue;
        if (!this._has(nr, nc)) continue;
        const k = this._key(nr, nc);
        if (!connected.has(k)) { connected.add(k); queue.push([nr, nc]); }
      }
    }
    return connected;
  }

  _collectFloating() {
    const connected = this._findConnected();
    return this._allCells().filter(({ row, col }) => !connected.has(this._key(row, col)));
  }

  // ── Graphics ──────────────────────────────────────────────────────────────

  _initGraphics() {
    const bg = this.add.graphics();
    const _th = BG_THEMES[appSettings.bgTheme] || BG_THEMES[0];
    const [tl,tr,bl,br] = _th.gradient;
    bg.fillGradientStyle(tl,tr,bl,br,1);
    bg.fillRect(0,0,this.W,this.H);
    if (_th.stars) {
      const sg = this.add.graphics();
      for (let i=0;i<60;i++){
        const sx=Phaser.Math.Between(0,this.W), sy=Phaser.Math.Between(0,this.H);
        const sr=Phaser.Math.FloatBetween(0.5,1.8);
        sg.fillStyle(0xffffff, Phaser.Math.FloatBetween(0.2,0.7));
        sg.fillCircle(sx,sy,sr);
      }
    }

    const brd = this.add.graphics();
    brd.lineStyle(1,0x333366,0.5);
    brd.strokeRect(BOARD_LEFT, FIRST_ROW_Y - R, COLS*D, this.H - FIRST_ROW_Y + R);

    const dl = this.add.graphics();
    dl.lineStyle(1.5,0xff4444,0.35);
    dl.lineBetween(BOARD_LEFT, this.dangerY, BOARD_LEFT+COLS*D, this.dangerY);

    this.boardGfx   = this.add.graphics();
    this.aimGfx     = this.add.graphics();
    this.shooterGfx = this.add.graphics();
    this.flyGfx     = this.add.graphics();

    // Init sprite pool and shooter image refs BEFORE _drawBoard
    this._bubblePool = [];
    this._curBubImg  = null;
    this._nxtBubImg  = null;

    // Load bubble textures from base64 (synchronous via canvas)
    // Always reload textures in case bubble set changed
    for (let i=0;i<6;i++) { if(this.textures.exists('bubble_'+i)) this.textures.remove('bubble_'+i); }
    if (this.textures.exists('frame')) this.textures.remove('frame');
    this._frameImg = null;
    if (true) {
      for (let i = 0; i < 6; i++) {
        const canvas = document.createElement('canvas');
        canvas.width = 96; canvas.height = 96;
        const ctx = canvas.getContext('2d');
        const imgEl = new Image();
        imgEl.src = getBubbleImgs()[i];
        if (imgEl.complete) {
          ctx.drawImage(imgEl, 0, 0, 96, 96);
          this.textures.addCanvas('bubble_' + i, canvas);
        } else {
          const idx = i, c = canvas, cx = ctx, el = imgEl;
          el.onload = () => {
            cx.drawImage(el, 0, 0, 96, 96);
            this.textures.addCanvas('bubble_' + idx, c);
            this._drawBoard(); this._redrawShooter();
          };
        }
      }
    }

    this._drawBoard();
    this._drawShooterBase();

    // Frame overlay — sits above all game graphics, below HUD text
    if (!this.textures.exists('frame')) {
      const canvas = document.createElement('canvas');
      canvas.width = this.W; canvas.height = this.H;
      const ctx = canvas.getContext('2d');
      const el = new Image();
      el.src = FRAME_IMG;
      const applyFrame = () => {
        ctx.drawImage(el, 0, 0, this.W, this.H);
        this.textures.addCanvas('frame', canvas);
        if (!this._frameImg) {
          this._frameImg = this.add.image(this.W/2, this.H/2, 'frame').setDepth(20);
        }
      };
      el.complete ? applyFrame() : (el.onload = applyFrame);
    } else {
      this._frameImg = this.add.image(this.W/2, this.H/2, 'frame').setDepth(20);
    }
  }

  _initUI() {

  _drawBubble(gfx, x, y, colorIdx, alpha=1) {
    // Use sprite image - draw as bitmap via gfx texture stamp
    const col = COLORS[colorIdx];
    gfx.fillStyle(0x000000,0.2*alpha); gfx.fillCircle(x+2,y+3,R-2);
    gfx.fillStyle(col,alpha);          gfx.fillCircle(x,y,R-1);
    gfx.fillStyle(0xffffff,0.3*alpha); gfx.fillCircle(x-R*.28,y-R*.28,R*.32);
    gfx.lineStyle(1.5,0xffffff,0.2*alpha); gfx.strokeCircle(x,y,R-1);
  }

  // Bakes a bomb texture to a canvas key so it can be reused as an image
  _getBombTexture() {
    const key = 'bomb_sprite';
    if (this.textures.exists(key)) return key;
    const size = D * 2;
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    const cx = size / 2, cy = size / 2;
    const r = R * 1.1; // almost full cell size

    // Shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 5;

    // Main sphere — radial gradient for 3D look
    const grad = ctx.createRadialGradient(cx - r*0.35, cy - r*0.35, r*0.05, cx, cy, r);
    grad.addColorStop(0,   '#666666');
    grad.addColorStop(0.35,'#222222');
    grad.addColorStop(1,   '#000000');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // Rim highlight
    ctx.strokeStyle = 'rgba(140,140,140,0.35)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();

    // Specular highlight top-left
    const spec = ctx.createRadialGradient(cx - r*0.4, cy - r*0.4, 0, cx - r*0.4, cy - r*0.4, r*0.45);
    spec.addColorStop(0,   'rgba(255,255,255,0.6)');
    spec.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = spec;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

    // Fuse base — small cap on top-right of sphere
    const fuseBaseX = cx + r * 0.6;
    const fuseBaseY = cy - r * 0.6;
    ctx.fillStyle = '#666';
    ctx.beginPath(); ctx.arc(fuseBaseX, fuseBaseY, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#999';
    ctx.beginPath(); ctx.arc(fuseBaseX, fuseBaseY, 2.5, 0, Math.PI*2); ctx.fill();

    // Fuse cord — short curve going top-right, stays within canvas
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(fuseBaseX, fuseBaseY);
    ctx.bezierCurveTo(fuseBaseX + 6, fuseBaseY - 8, fuseBaseX + 4, fuseBaseY - 14, fuseBaseX + 2, fuseBaseY - 18);
    ctx.stroke();

    // Fuse highlight
    ctx.strokeStyle = 'rgba(180,120,60,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(fuseBaseX + 1, fuseBaseY);
    ctx.bezierCurveTo(fuseBaseX + 7, fuseBaseY - 8, fuseBaseX + 5, fuseBaseY - 14, fuseBaseX + 3, fuseBaseY - 18);
    ctx.stroke();

    // Spark at fuse tip — contained within canvas
    const sx = fuseBaseX + 2, sy2 = fuseBaseY - 18;
    const sparkColors = ['#FFD700','#FF8C00','#FF4500','#ffffff'];
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const len = 2.5 + Math.random() * 3;
      ctx.strokeStyle = sparkColors[i % sparkColors.length];
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(sx, sy2);
      ctx.lineTo(sx + Math.cos(angle) * len, sy2 + Math.sin(angle) * len);
      ctx.stroke();
    }
    // Spark glow
    const glowGrad = ctx.createRadialGradient(sx, sy2, 0, sx, sy2, 5);
    glowGrad.addColorStop(0, 'rgba(255,200,0,0.9)');
    glowGrad.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath(); ctx.arc(sx, sy2, 5, 0, Math.PI*2); ctx.fill();

    this.textures.addCanvas(key, c);
    return key;
  }

  _spawnBubbleImg(x, y, colorIdx, alpha=1) {
    const key = 'bubble_' + colorIdx;
    if (!this.textures.exists(key)) return null;
    const img = this.add.image(x, y, key);
    img.setDisplaySize(D, D);
    img.setAlpha(alpha);
    img.setDepth(1);
    return img;
  }

  _drawBoard() {
    this.boardGfx.clear();
    // Hide all pooled images
    for (const img of this._bubblePool) img.setVisible(false);
    let poolIdx = 0;
    const minY = -R * 2;
    const maxY = this.H + R;
    for (const { row, col, color } of this._allCells()) {
      const { x, y } = cellXY(row, col, this.cameraRow);
      if (y < minY || y > maxY) continue;
      const key = 'bubble_' + color;
      if (this.textures.exists(key)) {
        let img = this._bubblePool[poolIdx];
        if (!img) {
          img = this.add.image(0, 0, key).setDepth(2);
          this._bubblePool.push(img);
        }
        img.setTexture(key).setPosition(x, y).setDisplaySize(D, D).setAlpha(1).setVisible(true);
        poolIdx++;
      } else {
        this._drawBubble(this.boardGfx, x, y, color);
      }
    }
  }

  _drawShooterBase() {
    this.shooterGfx.clear();
    this.shooterGfx.fillStyle(0x1e1b4b,1);
    this.shooterGfx.fillRoundedRect(this.sx-42,this.sy-8,84,52,14);
    this.shooterGfx.lineStyle(1.5,0x4c1d95,0.7);
    this.shooterGfx.strokeRoundedRect(this.sx-42,this.sy-8,84,52,14);
  }

  _redrawShooter() {
    this._drawShooterBase();
    const ck = 'bubble_' + this.curColor;
    const nk = 'bubble_' + this.nxtColor;
    if (this.textures.exists(ck)) {
      if (!this._curBubImg) this._curBubImg = this.add.image(0,0,ck).setDepth(3);
      this._curBubImg.setTexture(ck).setPosition(this.sx, this.sy+14).setDisplaySize(D,D).setAlpha(1).setVisible(true);
    } else {
      if (this._curBubImg) this._curBubImg.setVisible(false);
      this._drawBubble(this.shooterGfx, this.sx, this.sy+14, this.curColor);
    }
    if (this.textures.exists(nk)) {
      if (!this._nxtBubImg) this._nxtBubImg = this.add.image(0,0,nk).setDepth(3);
      this._nxtBubImg.setTexture(nk).setPosition(this.W-38, this.sy+14).setDisplaySize(D*0.65,D*0.65).setAlpha(0.85).setVisible(true);
    } else {
      if (this._nxtBubImg) this._nxtBubImg.setVisible(false);
      this._drawBubble(this.shooterGfx, this.W-38, this.sy+14, this.nxtColor, 0.65);
    }
  }

  _updateBombButton() {
    if (!this.bombCountTxt) return;
    if (this.bombCharges > 0) {
      this.bombIconTxt.setText('💣');
      this.bombCountTxt.setText(`x${this.bombCharges}`);
      this.bombCountTxt.setColor('#fbbf24');
    } else {
      this.bombIconTxt.setText('📺');
      this.bombCountTxt.setText(T().watch_ad);
      this.bombCountTxt.setColor('#93c5fd');
    }
  }

  _showRewardedBombAd() {
    if (this.isDead || this.shooting) return;
    Ads.showRewarded(
      () => { // onGranted
        this.bombCharges = 3;
        savedBombCharges = 3;
        this._updateBombButton();
        this._showPopText('💣 x3', this.sx, this.sy - 20);
      },
      null
    );
  }

  _updatePainterButton() {
    if (!this.painterCountTxt) return;
    if (this.painterCharges > 0) {
      this.painterIconTxt.setText('🎨');
      this.painterCountTxt.setText(`x${this.painterCharges}`);
      this.painterCountTxt.setColor('#86efac');
    } else {
      this.painterIconTxt.setText('📺');
      this.painterCountTxt.setText(T().watch_ad);
      this.painterCountTxt.setColor('#93c5fd');
    }
  }

  _showRewardedPainterAd() {
    if (this.isDead || this.shooting) return;
    Ads.showRewarded(
      () => {
        this.painterCharges = 2;
        savedPainterCharges = 2;
        this._updatePainterButton();
        this._showPopText('🎨 x2', this.sx, this.sy - 20);
      },
      null
    );
  }

  _activatePainter() {
    if (this.isDead || this.shooting || this.painterCharges <= 0) return;
    this.painterCharges--;
    savedPainterCharges = this.painterCharges;
    this._updatePainterButton();
    SFX.play('painter');

    // Change all bubbles on the board to the current shoot color
    const targetColor = this.curColor;
    const positions = [];
    for (const [key, color] of this.cells.entries()) {
      if (color !== targetColor) {
        this.cells.set(key, targetColor);
        const [row, col] = key.split(',').map(Number);
        positions.push({ row, col });
      }
    }

    if (positions.length === 0) {
      this._showPopText('🎨', this.sx, this.sy - 20);
      return;
    }

    // Cascade animation: ripple from bottom-most bubble upward
    positions.sort((a, b) => b.row - a.row); // bottom rows first (higher row index = lower on screen)
    let delay = 0;
    const step = Math.min(60, 600 / positions.length);
    for (const { row, col } of positions) {
      const { x, y } = cellXY(row, col, this.cameraRow);
      this.time.delayedCall(delay, () => {
        // Flash ring in target color
        const ring = this.add.graphics().setDepth(15);
        const col_ = COLORS[targetColor];
        ring.lineStyle(3, col_, 1);
        ring.strokeCircle(x, y, R + 2);
        this.tweens.add({
          targets: ring, scaleX: 1.6, scaleY: 1.6, alpha: 0, duration: 300,
          ease: 'Sine.easeOut', onComplete: () => ring.destroy()
        });
      });
      delay += step;
    }

    // Redraw board after all animations would be done
    this.time.delayedCall(delay + 100, () => {
      this._drawBoard();
      this._showPopText(`🎨 ×${positions.length}`, this.sx, this.sy - 40);
    });
  }

  _activateBomb() {
    if (this.isDead || this.shooting || this.bombCharges <= 0 || this.isBomb) return;
    this.isBomb = true;
    this._bombJustActivated = true;
    this.time.delayedCall(50, () => { this._bombJustActivated = false; });
    this.bombCharges--;
    savedBombCharges = this.bombCharges;
    this._updateBombButton();
    // Save current bubble to restore after bomb fires
    this._savedColor = this.curColor;
    this._savedNxt   = this.nxtColor;
    // Redraw shooter showing bomb in hand
    this._drawShooterBase();
    // Hide the current bubble sprite and show real bomb image
    if (this._curBubImg) this._curBubImg.setVisible(false);
    const bombKey = this._getBombTexture();
    if (this.bombHandImg) this.bombHandImg.destroy();
    this.bombHandImg = this.add.image(this.sx, this.sy+14, bombKey).setDisplaySize(D, D).setDepth(10);
  }

  _nextBubble() {
    if (this._savedColor !== undefined) {
      this.curColor    = this._savedColor;
      this.nxtColor    = this._savedNxt;
      this._savedColor = undefined;
      this._savedNxt   = undefined;
      this._redrawShooter();
      return;
    }
    const active = [...this._getActiveColors()];
    if (active.length > 0 && this.nxtColor !== undefined && !active.includes(this.nxtColor)) {
      this.nxtColor = this._randomActiveColor();
    }
    this.curColor = this.nxtColor ?? this._randomActiveColor();
    this.nxtColor  = this._randomActiveColor();
    this._redrawShooter();
    // Flush any scrolls that were queued while a bubble was in flight
    if (this._pendingScroll > 0) {
      this._pendingScroll = 0;
      this._scrollOneRow();
    }
  }

  _onPointerDown(ptr) {
    if (this.isDead || this.shooting || this._bombJustActivated || this.isPaused) return;
    // Block taps near the options button (top-centre circle r=14)
    if (Math.hypot(ptr.x - this.W/2, ptr.y - 18) <= 20) return;
    if (ptr.y >= this.dangerY) return;
    // Just draw the aim line — shot fires on pointerup
    this._drawAimLine(ptr.x, ptr.y);
    this._aimPtr = ptr;
  }

  _onPointerUp(ptr) {
    if (this.isDead || this.shooting || this._bombJustActivated || this.isPaused) return;
    if (Math.hypot(ptr.x - this.W/2, ptr.y - 18) <= 20) return;
    if (!this._aimPtr) return; // no valid press recorded
    this._aimPtr = null;
    const dx = ptr.x - this.sx, dy = ptr.y - (this.sy+14);
    if (dy >= -5) { this.aimGfx.clear(); return; }
    if (ptr.y >= this.dangerY) { this.aimGfx.clear(); return; }
    const len = Math.hypot(dx, dy);
    this._shoot(dx/len, dy/len);
  }

  _onPointerMove(ptr) {
    if (this.isDead || this.shooting || this.isPaused) return;
    this._drawAimLine(ptr.x, ptr.y);
  }

  _drawAimLine(tx, ty) {
    this.aimGfx.clear();
    const sx=this.sx, sy=this.sy+14;
    let dx=tx-sx, dy=ty-sy;
    if (dy >= -5) return;
    const len=Math.hypot(dx,dy); dx/=len; dy/=len;
    this.aimGfx.lineStyle(1.5,0xffffff,0.22);
    let px=sx,py=sy,pdx=dx,pdy=dy;
    const lw=BOARD_LEFT+R, rw=BOARD_LEFT+COLS*D-R;
    for (let i=0; i<26; i++) {
      const nx=px+pdx*12, ny=py+pdy*12;
      if (ny < FIRST_ROW_Y) break;
      if (i%2===0){
        this.aimGfx.beginPath(); this.aimGfx.moveTo(px,py);
        this.aimGfx.lineTo(nx,ny); this.aimGfx.strokePath();
      }
      let lx=nx;
      if(lx<=lw){lx=lw+(lw-lx);pdx=-pdx;}
      if(lx>=rw){lx=rw-(lx-rw);pdx=-pdx;}
      px=lx; py=ny;
    }
  }

  _shoot(dx, dy) {
    this.shooting = true;
    this.aimGfx.clear();
    SFX.play(this.isBomb ? 'bomb' : 'shoot');
    const color   = this.curColor;
    const isBomb  = !!this.isBomb;
    this.isBomb   = false;
    if (this.bombHandImg) { this.bombHandImg.destroy(); this.bombHandImg = null; }
    const speed = 11;
    let bx=this.sx, by=this.sy+14, vx=dx*speed, vy=dy*speed;
    const lw=BOARD_LEFT+R, rw=BOARD_LEFT+COLS*D-R;

    this.flyGfx.clear();
    let flyImg = null;
    if (isBomb) {
      const bombKey = this._getBombTexture();
      flyImg = this.add.image(bx, by, bombKey).setDisplaySize(D, D).setDepth(5);
    } else {
      const fk = 'bubble_' + color;
      if (this.textures.exists(fk)) {
        flyImg = this.add.image(bx, by, fk).setDisplaySize(D, D).setDepth(5);
      } else {
        this._drawBubble(this.flyGfx, 0, 0, color);
        this.flyGfx.x=bx; this.flyGfx.y=by;
      }
    }
    // flying bomb uses flyImg sprite, no separate label needed
    const bombLabel = null;

    const step = () => {
      if (this.isDead) {
        this.flyGfx.clear(); this.flyGfx.x=0; this.flyGfx.y=0;
        if (flyImg) { flyImg.destroy(); flyImg=null; }
        this.shooting=false; this._redrawShooter(); return;
      }
      bx+=vx; by+=vy;
      if(bx<=lw){bx=lw+(lw-bx);vx=-vx;}
      if(bx>=rw){bx=rw-(bx-rw);vx=-vx;}
      this.flyGfx.x=bx; this.flyGfx.y=by;
      if (flyImg) { flyImg.x=bx; flyImg.y=by; }

      // Collision
      let hit = false;
      for (const {row,col} of this._allCells()) {
        const {x,y} = cellXY(row, col, this.cameraRow);
        if (Math.hypot(bx-x, by-y) < D*0.92) { hit=true; break; }
      }
      const topHit = by <= FIRST_ROW_Y + R*0.5;

      if (hit || topHit) {
        this.flyGfx.clear(); this.flyGfx.x=0; this.flyGfx.y=0;
        if (flyImg) { flyImg.destroy(); flyImg=null; }

        if (isBomb) {
          this._onBombLanded(bx, by);
        } else {
          const snap = this._snapCell(bx, by);
          if (snap) {
            this._set(snap.row, snap.col, color);
            this._onLanded(snap);
          } else {
            this.shooting=false; this._nextBubble();
          }
        }
        return;
      }
      this.time.delayedCall(15, step);
    };
    step();
  }

  // ── Bomb explosion ────────────────────────────────────────────────────────

  _onBombLanded(bx, by) {
    SFX.play('burst'); // impact
    // Collect all bubbles within blast radius (2.5 × D)
    const BLAST_R = D * 2.5;
    const blasted = [];
    for (const {row, col, color} of this._allCells()) {
      const {x, y} = cellXY(row, col, this.cameraRow);
      if (Math.hypot(bx - x, by - y) <= BLAST_R) {
        blasted.push({ row, col, color, wx: x, wy: y });
      }
    }

    // Remove blasted bubbles then collect floaters
    for (const {row, col} of blasted) this._del(row, col);
    const floaters = this._collectFloating();
    for (const {row, col} of floaters) this._del(row, col);
    this._drawBoard();

    const pts = blasted.length * 10 + Math.round(floaters.length * 10 * 1.15);
    this.score += pts;
    if (pts > 0) this._showPopText(pts, bx, by);

    const blastedW  = blasted.map(b => ({ x: b.wx, y: b.wy, color: b.color }));
    const floatersW = floaters.map(({row, col, color}) => ({ ...cellXY(row, col, this.cameraRow), color }));

    // Big shockwave ring
    const sw = this.add.graphics();
    this.tweens.addCounter({ from: R, to: BLAST_R * 1.1, duration: 320,
      onUpdate: tw => { sw.clear(); sw.lineStyle(4, 0xffffff, 1 - tw.progress); sw.strokeCircle(bx, by, tw.getValue()); },
      onComplete: () => sw.destroy() });

    let done = 0;
    const onDone = () => {
      if (++done < 2) return;
      if (this.cells.size === 0 && this.rowsAdded >= this.maxNewRows) { this._victory(); return; }
      if (this.cells.size === 0) {
        this.shooting = false;
        this.rowTimer.reset({ delay: this.rowDelay, loop: true, callback: this._scrollOneRow, callbackScope: this });
        this._scrollOneRow(); this._updateUI(); this._nextBubble(); return;
      }
      this._checkDanger(); this._updateUI();
      this.shooting = false; this._nextBubble();
    };
    this._animateExplosion(blastedW, onDone);
    this._animateFalling(floatersW, onDone);
  }

  // ── Match & effects ───────────────────────────────────────────────────────

  _onLanded(placed) {
    const group = this._floodFill(placed.row, placed.col);

    if (group.length >= 3) {
      this.combo++;
      SFX.play(this.combo >= 2 ? 'combo' : 'burst', this.combo);
      const pts = group.length * 10 * this.combo;
      this.score += pts;
      const {x:px,y:py} = cellXY(placed.row, placed.col, this.cameraRow);
      this._showPopText(pts, px, py);

      const colorIdx = this._get(placed.row, placed.col);
      for (const {row,col} of group) this._del(row,col);

      const floaters = this._collectFloating();
      const floaterPts = Math.round(floaters.length * 10 * 1.15);
      this.score += floaterPts;
      if (floaterPts > 0) {
        const {x:fx, y:fy} = cellXY(placed.row, placed.col, this.cameraRow);
        this._showPopText(floaterPts, fx + 30, fy - 20);
      }
      for (const {row,col} of floaters) this._del(row,col);

      this._drawBoard();

      const groupW    = group.map(({row,col})=>({...cellXY(row,col,this.cameraRow),color:colorIdx}));
      const floatersW = floaters.map(({row,col,color})=>({...cellXY(row,col,this.cameraRow),color}));

      let done=0;
      const onDone=()=>{
        if(++done<2)return;
        // True victory: board empty AND no more rows to add
        if (this.cells.size === 0 && this.rowsAdded >= this.maxNewRows) {
          this._victory(); return;
        }
        // Board empty but rows remain: scroll immediately
        if (this.cells.size === 0) {
          this.shooting = false;
          this.rowTimer.reset({ delay: this.rowDelay, loop: true, callback: this._scrollOneRow, callbackScope: this });
          this._scrollOneRow();
          this._updateUI();
          this._nextBubble();
          return;
        }
        this._checkDanger(); this._updateUI();
        this.shooting=false; this._nextBubble();
      };
      this._animateExplosion(groupW, onDone);
      this._animateFalling(floatersW, onDone);

    } else {
      this.combo=0;
      SFX.play('land');
      this._drawBoard(); this._checkDanger(); this._updateUI();
      this.shooting=false; this._nextBubble();
    }
  }

  // ── Animations ────────────────────────────────────────────────────────────

  _animateExplosion(group, onDone) {
    let pending = group.length * 6;
    if (!pending) { onDone(); return; }
    const done = ()=>{ if(--pending<=0) onDone(); };
    for (const {x,y,color} of group) {
      const bc = COLORS[color];
      const rg = this.add.graphics();
      this.tweens.addCounter({from:R*.5,to:R*2.2,duration:280,
        onUpdate:tw=>{rg.clear();rg.lineStyle(3,bc,1-tw.progress);rg.strokeCircle(x,y,tw.getValue());},
        onComplete:()=>rg.destroy()});
      for (let i=0;i<6;i++){
        const angle=(i/6)*Math.PI*2, dist=Phaser.Math.Between(28,52), size=Phaser.Math.Between(4,9);
        const p=this.add.graphics();
        p.fillStyle(bc,1);p.fillCircle(0,0,size);
        p.fillStyle(0xffffff,.5);p.fillCircle(-size*.25,-size*.25,size*.35);
        p.x=x;p.y=y;
        this.tweens.add({targets:p,x:x+Math.cos(angle)*dist,y:y+Math.sin(angle)*dist,
          scaleX:.1,scaleY:.1,alpha:0,duration:Phaser.Math.Between(220,380),ease:'Power2',
          onComplete:()=>{p.destroy();done();}});
      }
    }
  }

  _animateFalling(floaters, onDone) {
    if (!floaters.length) { onDone(); return; }
    let pending=floaters.length;
    const done=()=>{ if(--pending<=0) onDone(); };
    for (const {x,y,color} of floaters) {
      const key = 'bubble_' + color;
      const delay=Phaser.Math.Between(0,80);
      const bounce=Phaser.Math.Between(18,32);
      const fall=this.H-y+60;
      const dur=Phaser.Math.Between(480,700);
      if (this.textures.exists(key)) {
        const g = this.add.image(x, y, key).setDisplaySize(D, D).setDepth(2);
        this.tweens.add({targets:g,y:y-bounce,duration:120,ease:'Sine.easeOut',delay,
          onComplete:()=>this.tweens.add({targets:g,y:y+fall,alpha:0,duration:dur,
            ease:'Cubic.easeIn',onComplete:()=>{g.destroy();done();}})});
      } else {
        const g=this.add.graphics();
        this._drawBubble(g,0,0,color); g.x=x; g.y=y;
        this.tweens.add({targets:g,y:y-bounce,duration:120,ease:'Sine.easeOut',delay,
          onComplete:()=>this.tweens.add({targets:g,y:y+fall,alpha:0,duration:dur,
            ease:'Cubic.easeIn',onComplete:()=>{g.destroy();done();}})});
      }
    }
  }

  // ── Checks & UI ───────────────────────────────────────────────────────────

  _debugCompleteLevel() {
    if (this.isDead) return;
    // Clear the board and mark all rows as added so victory triggers
    this.cells.clear();
    this.rowsAdded = this.maxNewRows;
    if (this._bubblePool) for (const img of this._bubblePool) img.setVisible(false);
    this.boardGfx.clear();
    this._victory();
  }

  _checkDanger() {
    for (const {row,col} of this._allCells()) {
      const {y} = cellXY(row, col, this.cameraRow);
      if (y >= this.dangerY) { this._gameOver(); return; }
    }
  }

  // Returns the set of color indices currently present in the grid
  _getActiveColors() {
    const active = new Set();
    for (const color of this.cells.values()) active.add(color);
    return active;
  }

  _randomActiveColor() {
    const active = [...this._getActiveColors()];
    if (active.length === 0) return Phaser.Math.Between(0, COLORS.length - 1);
    return active[Phaser.Math.Between(0, active.length - 1)];
  }

  _showPopText(pts, x, y) {
    const label = this.combo>1 ? `${this.combo}x! +${pts}` : `+${pts}`;
    const t = this.add.text(x,y,label,{
      fontSize:this.combo>1?'22px':'16px',fontFamily:'Georgia,serif',fontStyle:'bold',
      color:this.combo>1?'#fbbf24':'#ffffff',stroke:'#000',strokeThickness:3}).setOrigin(.5);
    this.tweens.add({targets:t,y:y-65,alpha:0,duration:850,onComplete:()=>t.destroy()});
  }

  _updateUI() {
    this.scoreTxt.setText(T().score(this.score));
    this.levelTxt.setText(T().level_hud(this.level));
  }

  // ── Victory ───────────────────────────────────────────────────────────────

  _victory() {
    if (this.isDead) return;
    this.isDead = true;
    SFX.play('victory');
    this.rowTimer.remove();
    this.aimGfx.clear();

    // Hide all bubble sprites
    if (this._bubblePool) for (const img of this._bubblePool) img.setVisible(false);
    if (this._curBubImg) this._curBubImg.setVisible(false);
    if (this._nxtBubImg) this._nxtBubImg.setVisible(false);
    this.boardGfx.clear(); this.shooterGfx.clear();

    const D = 100; // local depth base

    // Confetti burst
    for (let i = 0; i < 40; i++) {
      this.time.delayedCall(Phaser.Math.Between(0, 600), () => {
        const x = Phaser.Math.Between(50, this.W - 50);
        const p = this.add.graphics().setDepth(D + 5);
        const col = COLORS[Phaser.Math.Between(0, COLORS.length - 1)];
        p.fillStyle(col, 1);
        p.fillRect(0, 0, Phaser.Math.Between(6, 12), Phaser.Math.Between(6, 12));
        p.x = x; p.y = -10;
        this.tweens.add({ targets: p, y: this.H + 20, x: x + Phaser.Math.Between(-60, 60),
          angle: Phaser.Math.Between(0, 360), alpha: 0,
          duration: Phaser.Math.Between(900, 1800), ease: 'Cubic.easeIn',
          onComplete: () => p.destroy() });
      });
    }

    const ov = this.add.graphics().setDepth(D);
    ov.fillStyle(0x000000, 0.72);
    ov.fillRect(0, 0, this.W, this.H);

    this.add.text(this.W/2, this.H*.30, '🏆', { fontSize: '72px' }).setOrigin(.5).setDepth(D+1);
    this.add.text(this.W/2, this.H*.42, T().victory_title, {
      fontSize: '38px', fontFamily: 'Georgia,serif', fontStyle: 'bold',
      color: '#fbbf24', stroke: '#000', strokeThickness: 5, align: 'center'
    }).setOrigin(.5).setDepth(D+1);
    this.add.text(this.W/2, this.H*.57, T().victory_score(this.score), {
      fontSize: '22px', fontFamily: 'Georgia,serif', color: '#fff',
      stroke: '#000', strokeThickness: 3
    }).setOrigin(.5).setDepth(D+1);

    this._menuBtn(this.W/2, this.H*.67, T().btn_next_level, 0x15803d, () => {
      currentLevel = this.level + 1;
      localStorage.setItem('bb_level', currentLevel);
      // Intersticial cada 3 niveles
      if (this.level % 3 === 0) {
        Ads.showInterstitial(() => this.scene.restart({ level: currentLevel }));
      } else {
        this.scene.restart({ level: currentLevel });
      }
    }, D+1);
    this._menuBtn(this.W/2, this.H*.78, T().btn_menu, 0x1e1b4b, () => {
      currentLevel = this.level + 1;
      localStorage.setItem('bb_level', currentLevel);
      if (this.level % 3 === 0) {
        Ads.showInterstitial(() => this.scene.start('Menu'));
      } else {
        this.scene.start('Menu');
      }
    }, D+1);
  }

  // ── Game Over ─────────────────────────────────────────────────────────────

  _gameOver() {
    if (this.isDead) return;
    this.isDead=true; SFX.play('defeat'); this.rowTimer.remove(); this.aimGfx.clear();
    // Hide all bubble sprites so they don't bleed through
    if (this._bubblePool) for (const img of this._bubblePool) img.setVisible(false);
    if (this._curBubImg) this._curBubImg.setVisible(false);
    if (this._nxtBubImg) this._nxtBubImg.setVisible(false);
    this.boardGfx.clear(); this.shooterGfx.clear();
    const D = 100; // local depth base
    const ov=this.add.graphics().setDepth(D);
    ov.fillStyle(0x000000,.82); ov.fillRect(0,0,this.W,this.H);
    this.add.text(this.W/2,this.H*.34,'💥',{fontSize:'68px'}).setOrigin(.5).setDepth(D+1);
    this.add.text(this.W/2,this.H*.46,'GAME OVER',{fontSize:'38px',
      fontFamily:'Georgia,serif',fontStyle:'bold',color:'#ef4444',
      stroke:'#000',strokeThickness:5}).setOrigin(.5).setDepth(D+1);
    this.add.text(this.W/2,this.H*.55,T().gameover_score(this.score),{
      fontSize:'22px',fontFamily:'Georgia,serif',color:'#fff',
      stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(D+1);
    this._menuBtn(this.W/2,this.H*.65,T().btn_retry,0x6d28d9,()=>this.scene.restart(), D+1);
    this._menuBtn(this.W/2,this.H*.76,T().btn_menu,0x1e1b4b,()=>this.scene.start('Menu'), D+1);
  }

  _menuBtn(x,y,label,col,cb,depth=0){
    const g=this.add.graphics().setDepth(depth);
    g.fillStyle(col,1);g.fillRoundedRect(x-105,y-26,210,52,26);
    this.add.text(x,y,label,{fontSize:'19px',fontFamily:'Georgia,serif',
      fontStyle:'bold',color:'#fff'}).setOrigin(.5).setDepth(depth+1);
    this.add.zone(x,y,210,52).setInteractive({useHandCursor:true}).on('pointerdown',cb).setDepth(depth+2);
  }

  update() {
  }
}

// ─── CUSTOMIZE SCENE ─────────────────────────────────────────────────────────
class CustomizeScene extends Phaser.Scene {
  constructor() { super('Customize'); }

  create() {
    const W = this.scale.width, H = this.scale.height;
    this._activeTab = 'bubbles'; // 'bubbles' | 'fondo'

    // Background
    this._bgGfx = this.add.graphics();
    this._drawBg();

    // Title
    const titleGfx = this.add.graphics();
    drawPaletteIcon(titleGfx, W/2 - 68, 28, 10);
    this.add.text(W/2 + 6, 28, T().customize_title, {
      fontSize:'20px', fontFamily:'Georgia,serif', fontStyle:'bold',
      color:'#e2e8f0', stroke:'#000', strokeThickness:3
    }).setOrigin(0.5);

    // Tab bar
    this._tabBubbles = this._makeTab(W/2 - 70, 62, T().tab_bubbles, 'bubbles');
    this._tabFondo   = this._makeTab(W/2 + 70, 62, T().tab_bg,      'fondo');
    this._tabLine    = this.add.graphics();
    this._drawTabLine();

    // Content container (destroy/rebuild on tab switch)
    this._contentY = 100;
    this._buildContent();

    // Back button
    const bk = this.add.graphics();
    bk.fillStyle(0x1e1b4b,0.9); bk.fillRoundedRect(W/2-60, H-56, 120, 40, 20);
    bk.lineStyle(1.5,0x6d28d9,0.7); bk.strokeRoundedRect(W/2-60, H-56, 120, 40, 20);
    this.add.text(W/2, H-36, T().btn_back, {
      fontSize:'16px', fontFamily:'Georgia,serif', color:'#c4b5fd'
    }).setOrigin(0.5);
    this.add.zone(W/2, H-36, 120, 40).setInteractive({useHandCursor:true})
      .on('pointerdown', () => this.scene.start('Menu'));
  }

  _drawBg() {
    const W = this.scale.width, H = this.scale.height;
    this._bgGfx.clear();
    const th = BG_THEMES[appSettings.bgTheme] || BG_THEMES[0];
    const [tl,tr,bl,br] = th.gradient;
    this._bgGfx.fillGradientStyle(tl,tr,bl,br,1);
    this._bgGfx.fillRect(0,0,W,H);
  }

  _makeTab(x, y, label, id) {
    const txt = this.add.text(x, y, label, {
      fontSize:'17px', fontFamily:'Georgia,serif',
      color: this._activeTab === id ? '#ffffff' : '#6b7280'
    }).setOrigin(0.5).setInteractive({useHandCursor:true});
    txt.on('pointerdown', () => {
      if (this._activeTab === id) return;
      this._activeTab = id;
      this._tabBubbles.setColor(id === 'bubbles' ? '#ffffff' : '#6b7280');
      this._tabFondo.setColor(id === 'fondo'   ? '#ffffff' : '#6b7280');
      this._drawTabLine();
      this._clearContent();
      this._buildContent();
    });
    return txt;
  }

  _drawTabLine() {
    const W = this.scale.width;
    this._tabLine.clear();
    this._tabLine.lineStyle(2, 0x7c3aed, 1);
    const tx = this._activeTab === 'bubbles' ? W/2 - 70 : W/2 + 70;
    this._tabLine.lineBetween(tx - 40, 76, tx + 40, 76);
    this._tabLine.lineStyle(1, 0x333366, 0.4);
    this._tabLine.lineBetween(10, 77, W - 10, 77);
  }

  _clearContent() {
    if (this._contentObjs) this._contentObjs.forEach(o => o.destroy());
    this._contentObjs = [];
  }

  _buildContent() {
    this._contentObjs = [];
    const W = this.scale.width;
    if (this._activeTab === 'bubbles') this._buildBubbles(W);
    else this._buildFondo(W);
  }

  _buildBubbles(W) {
    const setNames = T().set_names;
    const previews = [
      // Set 1 preview: show blue bubble from set 1
      { set:1, key:'prev_s1' },
      { set:2, key:'prev_s2' },
      { set:3, key:'prev_s3' },
    ];

    // Load preview textures for each set if not already loaded
    const colorIdx = 1; // blue
    for (const p of previews) {
      if (!this.textures.exists(p.key)) {
        const canvas = document.createElement('canvas');
        canvas.width = 96; canvas.height = 96;
        const ctx = canvas.getContext('2d');
        const el = new Image();
        el.src = BUBBLE_SETS[p.set][colorIdx];
        const doLoad = () => {
          ctx.drawImage(el, 0, 0, 96, 96);
          this.textures.addCanvas(p.key, canvas);
          this._rebuildBubblePreviews(W, setNames, previews);
        };
        el.complete ? doLoad() : (el.onload = doLoad);
      }
    }
    this._rebuildBubblePreviews(W, setNames, previews);
  }

  _rebuildBubblePreviews(W, setNames, previews) {
    // Remove old preview objects
    if (this._previewObjs) this._previewObjs.forEach(o => o.destroy());
    this._previewObjs = [];
    const startY = 140;
    const cardW = 100, cardH = 130, gap = (W - 3*cardW) / 4;

    for (let i = 0; i < 3; i++) {
      const p = previews[i];
      const cx = gap + cardW/2 + i*(cardW + gap);
      const cy = startY + cardH/2;
      const isSelected = appSettings.bubbleSet === p.set;

      // Card bg
      const card = this.add.graphics();
      card.fillStyle(isSelected ? 0x4c1d95 : 0x1e1b4b, isSelected ? 0.9 : 0.6);
      card.fillRoundedRect(cx - cardW/2, cy - cardH/2, cardW, cardH, 12);
      card.lineStyle(2, isSelected ? 0xa78bfa : 0x333366, isSelected ? 1 : 0.5);
      card.strokeRoundedRect(cx - cardW/2, cy - cardH/2, cardW, cardH, 12);
      this._previewObjs.push(card);

      // Bubble preview image
      const previewY = cy - 20;
      if (this.textures.exists(p.key)) {
        const img = this.add.image(cx, previewY, p.key).setDisplaySize(56, 56);
        this._previewObjs.push(img);
      } else {
        const circ = this.add.graphics();
        circ.fillStyle(0x3498db, 1); circ.fillCircle(cx, previewY, 28);
        this._previewObjs.push(circ);
      }

      // Label
      const lbl = this.add.text(cx, cy + cardH/2 - 22, setNames[i], {
        fontSize:'13px', fontFamily:'Georgia,serif',
        color: isSelected ? '#fbbf24' : '#9ca3af'
      }).setOrigin(0.5);
      this._previewObjs.push(lbl);

      // Checkmark
      if (isSelected) {
        const ck = this.add.text(cx, cy + cardH/2 - 6, '✓', {
          fontSize:'14px', color:'#a78bfa'
        }).setOrigin(0.5);
        this._previewObjs.push(ck);
      }

      // Hit zone
      const zone = this.add.zone(cx, cy, cardW, cardH).setInteractive({useHandCursor:true});
      zone.on('pointerdown', () => {
        appSettings.bubbleSet = p.set;
        this._rebuildBubblePreviews(W, setNames, previews);
      });
      this._previewObjs.push(zone);
    }

    // Add all to content list for cleanup
    this._contentObjs = [...(this._contentObjs||[]).filter(o=>!this._previewObjs.includes(o)), ...this._previewObjs];
  }

  _buildFondo(W) {
    const cardW = 80, cardH = 100, cols = 3;
    const gap = (W - cols*cardW) / (cols+1);
    const startY = 120;

    BG_THEMES.forEach((theme, i) => {
      const col = i % cols, row = Math.floor(i / cols);
      const cx = gap + cardW/2 + col*(cardW + gap);
      const cy = startY + cardH/2 + row*(cardH + 18);
      const isSelected = appSettings.bgTheme === i;

      // Mini gradient preview
      const card = this.add.graphics();
      const [tl,tr,bl,br] = theme.gradient;
      card.fillGradientStyle(tl,tr,bl,br,1);
      card.fillRoundedRect(cx - cardW/2, cy - cardH/2, cardW, cardH - 28, 10);
      card.lineStyle(2, isSelected ? 0xa78bfa : 0x333355, isSelected ? 1 : 0.5);
      card.strokeRoundedRect(cx - cardW/2, cy - cardH/2, cardW, cardH - 28, 10);
      if (theme.stars) {
        for (let s=0; s<12; s++) {
          const sx = cx - cardW/2 + 4 + Math.random()*(cardW-8);
          const sy2 = cy - cardH/2 + 4 + Math.random()*(cardH - 36);
          card.fillStyle(0xffffff, 0.4 + Math.random()*0.4);
          card.fillCircle(sx, sy2, 0.8 + Math.random()*0.8);
        }
      }
      this._contentObjs.push(card);

      // Theme name
      const lbl = this.add.text(cx, cy + cardH/2 - 26, T().theme_names[i] || theme.name, {
        fontSize:'12px', fontFamily:'Georgia,serif',
        color: isSelected ? '#fbbf24' : '#9ca3af'
      }).setOrigin(0.5);
      this._contentObjs.push(lbl);

      if (isSelected) {
        const ck = this.add.text(cx, cy + cardH/2 - 12, '✓', {
          fontSize:'13px', color:'#a78bfa'
        }).setOrigin(0.5);
        this._contentObjs.push(ck);
      }

      // Hit zone
      const zone = this.add.zone(cx, cy, cardW, cardH).setInteractive({useHandCursor:true});
      zone.on('pointerdown', () => {
        appSettings.bgTheme = i;
        this._drawBg();
        this._clearContent();
        this._buildContent();
      });
      this._contentObjs.push(zone);
    });
  }
}

// ─── OPTIONS OVERLAY ─────────────────────────────────────────────────────────
function showOptionsOverlay(scene) {
  if (scene._optionsOpen) return;
  scene._optionsOpen = true;

  const W = scene.scale.width, H = scene.scale.height;
  const D = 200;
  const objs = [];

  // Pause game if in game scene
  const isGame = !!scene.rowTimer;
  if (isGame) {
    scene.isPaused = true;
    scene.rowTimer && scene.rowTimer.paused ? null : (scene.rowTimer.paused = true);
    scene.physics && scene.physics.pause();
  }

  const closeAll = () => {
    objs.forEach(o => o.destroy());
    scene._optionsOpen = false;
    if (isGame) {
      scene.isPaused = false;
      if (scene.rowTimer) scene.rowTimer.paused = false;
      scene.physics && scene.physics.resume();
      // Refresh HUD text immediately in case language changed
      if (scene._updateUI) scene._updateUI();
    }
  };

  // Dim background
  const dim = scene.add.graphics().setDepth(D);
  dim.fillStyle(0x000000, 0.7); dim.fillRect(0, 0, W, H);
  objs.push(dim);

  // Panel — taller to fit language row
  const pw = 280, ph = 290, px = W/2, py = H/2;
  const panel = scene.add.graphics().setDepth(D+1);
  panel.fillStyle(0x0f0f1a, 0.97); panel.fillRoundedRect(px-pw/2, py-ph/2, pw, ph, 18);
  panel.lineStyle(2, 0xb8860b, 0.9); panel.strokeRoundedRect(px-pw/2, py-ph/2, pw, ph, 18);
  panel.lineStyle(1, 0xffd700, 0.4); panel.strokeRoundedRect(px-pw/2+3, py-ph/2+3, pw-6, ph-6, 16);
  objs.push(panel);

  // Title
  const titleY = py - ph/2 + 30;
  const titleGfx = scene.add.graphics().setDepth(D+2);
  drawGearIcon(titleGfx, px - 62, titleY, 9);
  objs.push(titleGfx);
  const title = scene.add.text(px + 4, titleY, T().options_title, {
    fontSize: '18px', fontFamily: 'Georgia,serif', fontStyle: 'bold',
    color: '#ffd700', stroke: '#000', strokeThickness: 3
  }).setOrigin(0.5).setDepth(D+2);
  objs.push(title);

  // Divider
  const div = scene.add.graphics().setDepth(D+2);
  div.lineStyle(1, 0xffd700, 0.25); div.lineBetween(px-pw/2+20, py-ph/2+52, px+pw/2-20, py-ph/2+52);
  objs.push(div);

  // ── Row 1: Sound toggle ──────────────────────────────────────────────────
  const row1Y = py - 52;
  const drawToggle = () => {
    toggleGfx.clear();
    const on = appSettings.soundOn;
    toggleGfx.fillStyle(on ? 0x16a34a : 0x374151, 1);
    toggleGfx.fillRoundedRect(px + 20, row1Y - 14, 54, 28, 14);
    toggleGfx.fillStyle(0xffffff, 1);
    toggleGfx.fillCircle(on ? px + 20 + 40 : px + 20 + 14, row1Y, 11);
  };

  const soundLbl = scene.add.text(px - pw/2 + 24, row1Y, T().sound_on, {
    fontSize: '16px', fontFamily: 'Georgia,serif', color: '#e2e8f0'
  }).setOrigin(0, 0.5).setDepth(D+2);
  objs.push(soundLbl);

  const toggleGfx = scene.add.graphics().setDepth(D+2);
  objs.push(toggleGfx);
  drawToggle();

  const toggleZone = scene.add.zone(px + 20 + 27, row1Y, 60, 34)
    .setInteractive({ useHandCursor: true }).setDepth(D+3);
  toggleZone.on('pointerdown', () => {
    appSettings.soundOn = !appSettings.soundOn;
    drawToggle();
    soundLbl.setText(appSettings.soundOn ? T().sound_on : T().sound_off);
    if (appSettings.soundOn) SFX.play('pop');
  });
  objs.push(toggleZone);

  // ── Divider 2 ────────────────────────────────────────────────────────────
  const div2 = scene.add.graphics().setDepth(D+2);
  div2.lineStyle(1, 0xffd700, 0.12);
  div2.lineBetween(px-pw/2+20, py - 22, px+pw/2-20, py - 22);
  objs.push(div2);

  // ── Row 2: Language selector ─────────────────────────────────────────────
  const row2Y = py + 10;

  const langLbl = scene.add.text(px - pw/2 + 24, row2Y, T().lang_label, {
    fontSize: '16px', fontFamily: 'Georgia,serif', color: '#e2e8f0'
  }).setOrigin(0, 0.5).setDepth(D+2);
  objs.push(langLbl);

  // ES button
  const drawLangBtns = () => {
    esBg.clear(); enBg.clear();
    const esActive = appSettings.lang === 'es';
    esBg.fillStyle(esActive ? 0x6d28d9 : 0x1e1b4b, 1);
    esBg.fillRoundedRect(px + 14, row2Y - 14, 46, 28, 8);
    esBg.lineStyle(1.5, esActive ? 0xa78bfa : 0x4b5563, 1);
    esBg.strokeRoundedRect(px + 14, row2Y - 14, 46, 28, 8);
    enBg.fillStyle(!esActive ? 0x6d28d9 : 0x1e1b4b, 1);
    enBg.fillRoundedRect(px + 66, row2Y - 14, 46, 28, 8);
    enBg.lineStyle(1.5, !esActive ? 0xa78bfa : 0x4b5563, 1);
    enBg.strokeRoundedRect(px + 66, row2Y - 14, 46, 28, 8);
  };

  const esBg = scene.add.graphics().setDepth(D+2);
  const enBg = scene.add.graphics().setDepth(D+2);
  objs.push(esBg); objs.push(enBg);
  drawLangBtns();

  const esTxt = scene.add.text(px + 14 + 23, row2Y, '🇪🇸 ES', {
    fontSize: '13px', fontFamily: 'Georgia,serif', fontStyle: 'bold', color: '#fff'
  }).setOrigin(0.5).setDepth(D+3);
  const enTxt = scene.add.text(px + 66 + 23, row2Y, '🇬🇧 EN', {
    fontSize: '13px', fontFamily: 'Georgia,serif', fontStyle: 'bold', color: '#fff'
  }).setOrigin(0.5).setDepth(D+3);
  objs.push(esTxt); objs.push(enTxt);

  const esZone = scene.add.zone(px + 14 + 23, row2Y, 46, 28)
    .setInteractive({ useHandCursor: true }).setDepth(D+4);
  esZone.on('pointerdown', () => {
    if (appSettings.lang === 'es') return;
    appSettings.lang = 'es';
    drawLangBtns();
    closeAll();
    if (!isGame) scene.scene.restart();
    else showOptionsOverlay(scene);
  });
  objs.push(esZone);

  const enZone = scene.add.zone(px + 66 + 23, row2Y, 46, 28)
    .setInteractive({ useHandCursor: true }).setDepth(D+4);
  enZone.on('pointerdown', () => {
    if (appSettings.lang === 'en') return;
    appSettings.lang = 'en';
    drawLangBtns();
    closeAll();
    if (!isGame) scene.scene.restart();
    else showOptionsOverlay(scene);
  });
  objs.push(enZone);

  // ── Close button ──────────────────────────────────────────────────────────
  const closeGfx = scene.add.graphics().setDepth(D+2);
  closeGfx.fillStyle(0x6d28d9, 1); closeGfx.fillRoundedRect(px - 70, py + ph/2 - 54, 140, 40, 20);
  closeGfx.lineStyle(1, 0xa78bfa, 0.5); closeGfx.strokeRoundedRect(px - 70, py + ph/2 - 54, 140, 40, 20);
  objs.push(closeGfx);

  const closeTxt = scene.add.text(px, py + ph/2 - 34, T().btn_close, {
    fontSize: '16px', fontFamily: 'Georgia,serif', fontStyle: 'bold', color: '#fff'
  }).setOrigin(0.5).setDepth(D+3);
  objs.push(closeTxt);

  const closeZone = scene.add.zone(px, py + ph/2 - 34, 140, 40)
    .setInteractive({ useHandCursor: true }).setDepth(D+4);
  closeZone.on('pointerdown', () => closeAll());
  objs.push(closeZone);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
new Phaser.Game({
  type: Phaser.AUTO,
  width: GW, height: GH,
  backgroundColor: '#08081a',
  scene: [MenuScene, GameScene, CustomizeScene],
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    parent: 'game-container',
    width: GW,
    height: GH,
    zoom: 1,
  },
  render: {
    antialias: true,
    pixelArt: false,
    roundPixels: false,
  },
  devicePixelRatio: window.devicePixelRatio || 1,
});
</script>
</body>
</html>
